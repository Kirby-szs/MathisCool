<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MathIsFun</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #ff6b6b;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
    }

    .product {
        background: white;
        margin: 15px;
        padding: 15px;
        border-radius: 17px;
        width: 250px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        text-align: center;
    }

    .product img {
        width: 100%;
        border-radius: 10px;
    }

    .price {
        font-size: 18px;
        margin: 10px 0;
        color: green;
    }

    button {
        background: green;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: red;
    }
</style>

     <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
</head>
<body>

<header>
    <h1>My Store</h1>
    <p> Buy Things</p>
</header>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="product">
        <img src="https://shop.getbullish.com/cdn/shop/files/Squishy-Salted-Butter-Stress-Reliever-Squeezable-Stick-of-Butter.png?v=1769676306&width=1946">
        <h3>Butter Squishy</h3>
        <p class="price">$10</p>
        <button onclick="buyItem('Butter Squishy', '$10')">Buy</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <img src="https://i.ebayimg.com/images/g/cGsAAeSwU65oOh0M/s-l400.jpg" alt="Product">
        <h3>Squishy Toy</h3>
        <p class="price">$5-7</p>
        <button onclick="buyItem('Nee Doh', '$5-7')">Buy</button>
    </div>

     <div class="product">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f3/Fidget_spinner_red%2C_cropped.jpg" alt="Product">
        <h3>Fidget Spinner</h3>
        <p class="price">$2-3</p>
        <button onclick="buyItem('Fidget Spinner', '$2-3')">Buy</button>
    </div>

    <div class="product">
        <img src="https://i.ebayimg.com/images/g/lAAAAeSwIOlo1YmP/s-l300.jpg" alt="Product">
        <h3>10 Resin Animals</h3>
        <p class="price">$2</p>
        <button onclick="buyItem('10 Resin Animals', '$2')">Buy</button>
    </div>

</div>

<script>
    // CHANGE THIS EMAIL
    const yourEmail = "youremail@example.com";

    function buyItem(name, price) {
        const subject = encodeURIComponent("Order Request: " + name);
        const body = encodeURIComponent(
            "Hello!\n\nI wanna buy:\n" +
            name + "  (" + price + ")\n\n" +
            "We can meet on this date: ___________ At this time __________, At this place near school ______________+\n"
        );

        window.location.href = `mailto:${yourEmail}?subject=${subject}&body=${body}`;
    }
</script>

</body>
</html>
