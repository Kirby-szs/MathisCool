<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Shop</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #333;
        color: white;
        padding: 15px;
        text-align: center;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
    }

    .product {
        background: white;
        margin: 15px;
        padding: 15px;
        border-radius: 10px;
        width: 250px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        text-align: center;
    }

    .product img {
        width: 100%;
        border-radius: 10px;
    }

    .price {
        font-size: 18px;
        margin: 10px 0;
        color: green;
    }

    button {
        background: #28a745;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #218838;
    }
</style>
</head>
<body>

<header>
    <h1>My Shop</h1>
    <p>Edit products easily</p>
</header>

<div class="container">

    <!-- PRODUCT 1 -->
    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Product">
        <h3>Product HII</h3>
        <p class="price">$10</p>
        <button onclick="buyItem('Product Name', '$10')">Buy</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <img src="https://via.placeholder.com/250" alt="Product">
        <h3>Another Item</h3>
        <p class="price">$20</p>
        <button onclick="buyItem('Another Item', '$20')">Buy</button>
    </div>

</div>

<script>
    // CHANGE THIS EMAIL
    const yourEmail = "youremail@example.com";

    function buyItem(name, price) {
        const subject = encodeURIComponent("Order Request: " + name);
        const body = encodeURIComponent(
            "Hello,\n\nI would like to buy:\n" +
            name + " (" + price + ")\n\n" +
            "Please let me know next steps.\n"
        );

        window.location.href = `mailto:${yourEmail}?subject=${subject}&body=${body}`;
    }
</script>

</body>
</html>
