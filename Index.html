<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      max-width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h3 {
      margin: 10px 0 5px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: #222;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #444;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <h1>My Shop</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="container">
  <h2>Products</h2>

  <div class="products">

    <!-- PRODUCT 1 -->
    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product Name</h3>
      <p class="price">$19.99</p>
      <button>Add to Cart</button>
    </div>

    <!-- PRODUCT 2 -->
    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product Name</h3>
      <p class="price">$29.99</p>
      <button>Add to Cart</button>
    </div>

    <!-- PRODUCT 3 -->
    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product Name</h3>
      <p class="price">$39.99</p>
      <button>Add to Cart</button>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 My Shop</p>
</footer>

</body>
</html>
